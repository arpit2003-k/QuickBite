server:
  port: 8088

spring:
  application:
    name: review-service
  datasource:
    url: jdbc:mysql://localhost:3306/review_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: admin123
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka: 
  instance:
    prefer-ip-address: false
    hostname: localhost
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics

logging:
  level:
    com.quickbite.review: DEBUG
  file:
    name: logs/review-service.log