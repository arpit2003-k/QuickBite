server:
  port: 8080

spring:
  application:
    name: api-gateway
  
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true          # Enable dynamic routing using service IDs from Eureka
          lower-case-service-id: true
      routes:
        # Swagger docs routes
        - id: auth-service-docs
          uri: lb://auth-service
          predicates:
            - Path=/v3/api-docs/auth-service
          filters:
            - SetPath=/v3/api-docs

        - id: restaurant-service-docs
          uri: lb://restaurant-service
          predicates:
            - Path=/v3/api-docs/restaurant-service
          filters:
            - SetPath=/v3/api-docs

        - id: menu-service-docs
          uri: lb://menu-service
          predicates:
            - Path=/v3/api-docs/menu-service
          filters:
            - SetPath=/v3/api-docs

        - id: cart-service-docs
          uri: lb://cart-service
          predicates:
            - Path=/v3/api-docs/cart-service
          filters:
            - SetPath=/v3/api-docs

        - id: order-service-docs
          uri: lb://order-service
          predicates:
            - Path=/v3/api-docs/order-service
          filters:
            - SetPath=/v3/api-docs

        - id: payment-service-docs
          uri: lb://payment-service
          predicates:
            - Path=/v3/api-docs/payment-service
          filters:
            - SetPath=/v3/api-docs

        - id: delivery-service-docs
          uri: lb://delivery-service
          predicates:
            - Path=/v3/api-docs/delivery-service
          filters:
            - SetPath=/v3/api-docs

        - id: review-service-docs
          uri: lb://review-service
          predicates:
            - Path=/v3/api-docs/review-service
          filters:
            - SetPath=/v3/api-docs

        - id: notification-service-docs
          uri: lb://notification-service
          predicates:
            - Path=/v3/api-docs/notification-service
          filters:
            - SetPath=/v3/api-docs

        # Route for Auth Service (registration & login)
        - id: auth-service
          uri: lb://auth-service   # 'lb' = load balanced using service discovery
          predicates:
            - Path=/api/auth/**
#           filters:
#             - StripPrefix=1        # Removes /api from the path before forwarding

        # Route for Auth Service OAuth flows
        - id: auth-service-oauth
          uri: lb://auth-service
          predicates:
            - Path=/oauth2/**,/login/oauth2/**

        # Route for Restaurant Service
        - id: restaurant-service
          uri: lb://restaurant-service
          predicates:
            - Path=/api/restaurants/**
#           filters:
#             - StripPrefix=1

        # Route for Menu Service
        - id: menu-service
          uri: lb://menu-service
          predicates:
            - Path=/api/menu/**
#           filters:
#             - StripPrefix=1

        # Route for Cart Service
        - id: cart-service
          uri: lb://cart-service
          predicates:
            - Path=/api/cart/**
#           filters:
#             - StripPrefix=1

        # Route for Order Service
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
#           filters:
#             - StripPrefix=1

        # Route for Payment Service
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
#           filters:
#             - StripPrefix=1

        # Route for Delivery Service
        - id: delivery-service
          uri: lb://delivery-service
          predicates:
            - Path=/api/delivery/**
#           filters:
#             - StripPrefix=1

        # Route for Review Service
        - id: review-service
          uri: lb://review-service
          predicates:
            - Path=/api/reviews/**
#           filters:
#             - StripPrefix=1
        # Route for Review Service
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**

eureka:
  instance:
    prefer-ip-address: false
    hostname: localhost
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics   # Actuator endpoints
  info:
    env:
      enabled: true

info:
  app:
    name: API Gateway
    version: 1.0.0
    description: QuickBite API Gateway - Single Entry Point

logging:
  level:
    com.quickbite.gateway: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  file:
    name: logs/api-gateway.log

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: auth-service
        url: /v3/api-docs/auth-service
      - name: restaurant-service
        url: /v3/api-docs/restaurant-service
      - name: menu-service
        url: /v3/api-docs/menu-service
      - name: cart-service
        url: /v3/api-docs/cart-service
      - name: order-service
        url: /v3/api-docs/order-service
      - name: payment-service
        url: /v3/api-docs/payment-service
      - name: delivery-service
        url: /v3/api-docs/delivery-service
      - name: review-service
        url: /v3/api-docs/review-service
      - name: notification-service
        url: /v3/api-docs/notification-service
